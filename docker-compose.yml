version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: raji-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: raji
      POSTGRES_PASSWORD: raji_dev
      POSTGRES_DB: raji_finance
    ports:
      - '5432:5432'
    volumes:
      - raji_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U raji -d raji_finance']
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  raji_pgdata:
    driver: local
